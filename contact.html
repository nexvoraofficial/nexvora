<section class="hero">

<div class="container">

<h1>Contact Us</h1>

<p>
Have a project in mind? We'd love to hear from you.
</p>

</div>

</section>

<section class="container">

<div class="card">

<form action="https://formsubmit.co/mailnexvora@gmail.com" method="POST">

    <!-- Hidden Settings -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="New Contact Message - Nexvora">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_next" value="https://nexvoraofficial.github.io/nexvora/contact.html?success=true">

    <label>Full Name</label><br><br>
    <input type="text" name="name" placeholder="Enter your name" required>

    <br><br>

    <label>Email Address</label><br><br>
    <input type="email" name="email" placeholder="Enter your email" required>

    <br><br>

    <label>Subject</label><br><br>
    <input type="text" name="subject" placeholder="Project subject">

    <br><br>

    <label>Message</label><br><br>
    <textarea
        name="message"
        placeholder="Write your message..."
        rows="6"
        style="width:100%;padding:12px;border-radius:10px;"
        required></textarea>

    <br><br>

    <button type="submit" class="btn primary">
        Send Message
    </button>

</form>

</div>

</section>

<section class="container">

<div class="card">

<h2>Business Information</h2>

<p>📧 Email: hello@nexvora.com</p>
<p>🌍 Website: nexvoraofficial.github.io/nexvora</p>
<p>⏰ Available: Monday - Friday</p>
